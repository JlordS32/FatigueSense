rois:
  eyes:
    num_classes: 4
    input_size: [64, 32]   # W x H
    classes:
      - eyes_open
      - eyes_partially_closed
      - eyes_closed
      - eyes_occluded

  mouth:
    num_classes: 4
    input_size: [64, 64]
    classes:
      - mouth_closed
      - mouth_slight_open
      - mouth_wide_open
      - mouth_occluded

  head:
    num_classes: 6
    input_size: [128, 128]
    classes:
      - head_neutral
      - head_down
      - head_up
      - head_left
      - head_right
      - head_occluded

  torso:
    num_classes: 6
    input_size: [128, 128]
    classes:
      - torso_upright
      - torso_slight_slouch
      - torso_heavy_slouch
      - torso_lean_left
      - torso_lean_right
      - torso_occluded
